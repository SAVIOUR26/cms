<!--
  COMPONENT: Audio Waveform Animation
  USAGE: Podcast page, Song of Africa page
  ANIMATION: JS-driven bar height animation — triggered by initPage()
  REPLACE: bar count (default 24), color via --wave-color
-->

<!-- CSS — add to <style> block -->
<style>
.waveform-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 20px 16px;
    background: rgba(29, 185, 84, 0.05);
    border-radius: 12px;
    height: 64px;
}
.waveform-bar {
    width: 4px;
    border-radius: 2px;
    background: var(--wave-color, #1DB954);
    height: 8px;
    transition: height 0.15s ease;
    opacity: 0.7;
}
.waveform-bar.active { opacity: 1; }
</style>

<!-- HTML — paste into content area -->
<div class="waveform-container" data-animate data-delay="2">
    <!-- Bars generated by JS below — no need to write them manually -->
</div>

<!-- JS — include in page <script> block -->
<script>
function initWaveform() {
    const container = document.querySelector('.waveform-container');
    if (!container) return;
    const barCount = 28;
    const heights = [8,12,20,28,36,44,36,28,20,28,36,44,52,44,36,44,52,44,36,28,36,28,20,12,20,12,8,4];
    container.innerHTML = '';
    heights.forEach((h, i) => {
        const bar = document.createElement('div');
        bar.className = 'waveform-bar';
        bar.style.height = '8px';
        container.appendChild(bar);
        setTimeout(() => {
            bar.style.height = h + 'px';
            bar.classList.add('active');
        }, i * 40);
    });
    // Animate continuously after initial reveal
    setTimeout(() => {
        setInterval(() => {
            container.querySelectorAll('.waveform-bar').forEach(bar => {
                const newH = 6 + Math.random() * 46;
                bar.style.height = newH + 'px';
            });
        }, 200);
    }, barCount * 40 + 300);
}
// Call initWaveform() inside your initPage() function
</script>
